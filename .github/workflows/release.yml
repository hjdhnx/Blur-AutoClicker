name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release 标签，例如 v3.8.4（会以此名创建/更新 Release 及对应 tag）"
        required: true
        type: string

permissions:
  contents: write

env:
  # 手动触发用输入的版本号；tag 触发回退到推送的 tag 名
  RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  release:
    name: Build and release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Extract changelog
        shell: pwsh
        run: |
          $version = [regex]::Escape(("${{ env.RELEASE_TAG }}".TrimStart('v')))
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)# v$version .*?(?=\n# v|\z)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
            Set-Content -Path release_body.md -Value $match.Value.Trim()
          }

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: BlurAutoClicker ${{ env.RELEASE_TAG }}
          releaseBody: See CHANGELOG.md for details.
          releaseDraft: true

      - name: Update release body from changelog
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path release_body.md) {
            gh release edit "${{ env.RELEASE_TAG }}" --notes-file release_body.md
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "BlurAutoClicker.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "BlurAutoClicker.exe not found"; exit 1 }
          $tag = "${{ env.RELEASE_TAG }}"
          $zipName = "BlurAutoClicker-${tag}-portable.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_PATH=$zipName"

      - name: Upload portable zip to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" "$env:ZIP_PATH" --clobber
